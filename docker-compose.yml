# Forge memory backends.
#   redis    — short-term (session) episodic memory: ordered, tagged events.
#   pgvector — long-term memory: per-document summary + full-text(BM25-ish) +
#              embedding, queried across sessions for cross-session recall.
#
# Usage:
#   docker compose up -d
#   # Redis:    localhost:6379
#   # Postgres: localhost:5432  (db=forge user=forge password=forge)
#
# Note on BM25: this uses Postgres native full-text search (tsvector + ts_rank_cd)
# as the lexical pathway — BM25-adjacent and dependency-free. For true BM25, swap
# the image for `paradedb/paradedb` (ships pg_search + pgvector) and use its
# bm25 index; the Forge query layer is written so only the ranking SQL changes.

services:
  redis:
    image: redis:7-alpine
    container_name: forge-redis
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - "6379:6379"
    volumes:
      - forge-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: forge-pgvector
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge
      POSTGRES_DB: forge
    ports:
      - "5432:5432"
    volumes:
      - forge-pg-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forge"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  forge-redis-data:
  forge-pg-data:
